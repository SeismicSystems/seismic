name: Python Client

on:
  push:
    branches: [main]
    paths: ["clients/py/**"]
  pull_request:
    paths: ["clients/py/**"]

defaults:
  run:
    working-directory: clients/py

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --dev
      - run: uv run ty check src/

  test:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked --dev
      - run: uv run pytest tests/ -v --ignore=tests/integration

  integration-test:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --dev

      - name: Download sanvil from seismic-foundry nightly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download nightly \
            -R SeismicSystems/seismic-foundry \
            -p 'sfoundry_nightly_linux_amd64.tar.gz' \
            -D /tmp
          mkdir -p "$HOME/.seismic/bin"
          tar xzf /tmp/sfoundry_nightly_linux_amd64.tar.gz -C "$HOME/.seismic/bin" sanvil
          chmod +x "$HOME/.seismic/bin/sanvil"

      - name: Run integration tests
        env:
          SANVIL_BIN: ~/.seismic/bin/sanvil
        run: uv run pytest tests/integration/ -v
