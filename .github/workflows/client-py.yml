name: Python Client

on:
  push:
    branches: [main]
    paths:
      - "clients/py/**"
      - ".github/workflows/client-py.yml"
      - ".github/actions/setup-sfoundry/**"
  pull_request:
    paths:
      - "clients/py/**"
      - ".github/workflows/client-py.yml"
      - ".github/actions/setup-sfoundry/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    working-directory: clients/py

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --dev
      - run: uv run ty check src/

  test:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked --dev
      - run: uv run pytest tests/ -v --ignore=tests/integration

  integration-test:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --dev

      - id: sfoundry
        uses: ./.github/actions/setup-sfoundry
        with:
          channel: nightly

      - name: Run integration tests
        env:
          SANVIL_BIN: ${{ steps.sfoundry.outputs.sanvil-path }}
        run: uv run pytest tests/integration/ -v
